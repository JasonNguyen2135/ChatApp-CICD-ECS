name: Build Android APK

on:
  push:
    branches: [ "main" ]
    paths: [ "chatapp_mobile/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Google Services JSON
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' | base64 --decode > chatapp_mobile/app/google-services.json

      - name: Grant Permission
        run: chmod +x chatapp_mobile/gradlew

      - name: Build APK (Debug Version)
        env:
          MOBILE_BASE_URL: http://${{ secrets.ALB_DNS_NAME }}/ 
        run: |
          cd chatapp_mobile
          # Chạy lệnh build debug để có chữ ký mặc định
          ./gradlew assembleDebug

      - name: (DEBUG) List all APK files generated
        run: find chatapp_mobile -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chatapp-debug
          path: chatapp_mobile/**/*.apk
