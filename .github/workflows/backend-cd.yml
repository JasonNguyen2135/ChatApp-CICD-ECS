name: Deploy Backend

on:
  push:
    branches: [ "main" ]
    paths: [ "chatapp_backend/**" ] # Chỉ chạy khi sửa code backend

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: chatapp-nexus-repo     # Khớp với Terraform output
  ECS_SERVICE: chatapp-nexus-service     # Khớp với Terraform main.tf
  ECS_CLUSTER: chatapp-nexus-cluster     # Khớp với Terraform main.tf

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build & Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd chatapp_backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update ECS
        run: aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment