name: Deploy Backend to AWS ECS

on:
  push:
    branches: [ "main" ]
    paths: [ "chatapp_backend/**" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Cấu hình AWS Credentials (Region lấy từ Secret hoặc fix chuẩn Singapore)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1 # Đã đổi sang Singapore cho khớp hạ tầng của bạn

      # 2. Login vào Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # 3. Build, Tag, và Push Image (Sử dụng commit SHA để tránh lỗi cache image)
      - name: Build and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: chatapp-nexus-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd chatapp_backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 4. Cập nhật ECS Service để chạy bản mới
      - name: Deploy to Amazon ECS
        env:
          ECS_CLUSTER: chatapp-nexus-cluster
          ECS_SERVICE: chatapp-nexus-service
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment --region ap-southeast-1
